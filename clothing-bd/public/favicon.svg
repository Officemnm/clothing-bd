<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a1225"/>
      <stop offset="50%"  stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#172034"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="160" y1="108" x2="380" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c2d0e8"/>
    </linearGradient>
    <linearGradient id="needleGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="3" y="3" width="506" height="506" rx="94" stroke="white" stroke-opacity="0.06" stroke-width="2.5" fill="none"/>

  <!-- Top-left corner accent dots (subtle) -->
  <circle cx="60" cy="60" r="3" fill="#1e3a5f" opacity="0.7"/>
  <circle cx="80" cy="60" r="3" fill="#1e3a5f" opacity="0.5"/>
  <circle cx="60" cy="80" r="3" fill="#1e3a5f" opacity="0.5"/>

  <!-- ── Needle (top-right, diagonal) ── -->
  <!-- Needle shaft -->
  <rect x="-7" y="0" width="14" height="90" rx="7"
        fill="#3d5075"
        transform="translate(390,68) rotate(42)"/>
  <!-- Needle eye hole -->
  <ellipse cx="0" cy="15" rx="4.5" ry="7"
           fill="none" stroke="#8ba0bc" stroke-width="5"
           transform="translate(390,68) rotate(42)"/>
  <ellipse cx="0" cy="15" rx="1.8" ry="2.8"
           fill="#0f172a"
           transform="translate(390,68) rotate(42)"/>
  <!-- Needle tip -->
  <polygon points="0,0 -6,-14 6,-14"
           fill="#2a3f5e"
           transform="translate(390,68) rotate(42) translate(0,90)"/>

  <!-- ── Thread from needle eye ── -->
  <path d="M 399 96 C 388 138 374 176 366 218 C 358 258 354 292 344 328"
        stroke="#1e3a5f" stroke-width="7" stroke-linecap="round" fill="none"
        stroke-dasharray="11 9"/>

  <!-- ── Bold C letterform ── -->
  <!-- Arc: center≈(227,256) r=148 from (340,160) to (340,352), large arc counterclockwise -->
  <path d="M 340 164 A 148 148 0 1 0 340 348"
        stroke="url(#cGrad)" stroke-width="58" stroke-linecap="round"
        fill="none" filter="url(#glow)"/>

  <!-- ── Small dot accent (period / brand mark) ── -->
  <circle cx="362" cy="420" r="18" fill="#1e3a5f"/>
  <circle cx="362" cy="420" r="11" fill="#3b5278"/>
</svg>
